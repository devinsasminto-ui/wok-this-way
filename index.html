    <script>
      (function () {
        const STATSIG_CLIENT_KEY = 'client-sxSKqKaCcGAQYBXWWt0I1s0E6W5zbvwFA8LoWJ3gaA2';

        // Bail loudly if the CDN bundle didn't load (ad-blocker, offline, file:// CORS, etc.).
        if (!window.Statsig || !window.Statsig.StatsigClient) {
          console.error('[Statsig] SDK script did not load — window.Statsig is missing. ' +
            'Check the network tab for the @statsig/js-client request.');
          document.documentElement.setAttribute('data-statsig', 'sdk-missing');
          window.statsigReady = Promise.resolve();
          return;
        }

        // Build (or reuse) a stable user identifier so Statsig assignments are consistent.
        const STATSIG_USER_KEY = 'wok_statsig_user_id';
        let statsigUserID = localStorage.getItem(STATSIG_USER_KEY);
        if (!statsigUserID) {
          statsigUserID = 'guest-' + Math.random().toString(36).slice(2) + Date.now().toString(36);
          localStorage.setItem(STATSIG_USER_KEY, statsigUserID);
        }

        const statsigUser = {
          userID: statsigUserID,
          // userAgent is required for the dashboard's Browser / OS conditions to evaluate.
          userAgent: navigator.userAgent,
          locale: navigator.language,
          custom: { app: 'wok-this-way' }
        };

        const { StatsigClient, LogLevel } = window.Statsig;
        const statsigClient = new StatsigClient(STATSIG_CLIENT_KEY, statsigUser, {
          environment: { tier: 'production' },
          logLevel: (LogLevel && LogLevel.Debug) != null ? LogLevel.Debug : 'debug'
        });

        // Expose so React components and other scripts can call gates / experiments / events.
        window.statsigClient = statsigClient;
        document.documentElement.setAttribute('data-statsig', 'initializing');

        window.statsigReady = statsigClient
          .initializeAsync()
          .then(() => {
            console.log('%c[Statsig] initialized', 'color:#16a34a;font-weight:bold;', {
              userID: statsigUserID,
              sdkVersion: window.Statsig.SDK_VERSION || 'unknown'
            });
            document.documentElement.setAttribute('data-statsig', 'ready');
          })
          .catch((err) => {
            console.error('[Statsig] init failed', err);
            document.documentElement.setAttribute('data-statsig', 'failed');
          });
      })();
    </script>

        { id: "ma4", name: "Beef with Broccoli", price: 12.9, category: "Mains", desc: "Tender beef, crisp broccoli, oyster‑garlic sauce." },

        { id: "vg2", name: "Sautéed Green Beans", price: 9.6, category: "Vegetables", desc: "Dry‑fried with minced pork & chili." },

      const CATEGORIES = ["All", ...Array.from(new Set(DISHES.map((d) => d.category)))];

      // --- Local Storage helpers --------------------------------------------------
      const LS_KEYS = { CART: "wok_cart", SIGNUPS: "wok_signups", ORDERS: "wok_orders" };
      const readLS = (k, fallback) => {
        try { const v = JSON.parse(localStorage.getItem(k)); return v ?? fallback; } catch { return fallback; }
      };
      const writeLS = (k, v) => localStorage.setItem(k, JSON.stringify(v));

      // --- Statsig helpers --------------------------------------------------------
      // Wait for Statsig to finish initializing, then run a callback.
      const useStatsigReady = () => {
        const [ready, setReady] = useState(false);
        useEffect(() => {
          let cancelled = false;
          (window.statsigReady || Promise.resolve()).then(() => {
            if (!cancelled) setReady(true);
          });
          return () => { cancelled = true; };
        }, []);
        return ready;
      };

      const logStatsigEvent = (name, value, metadata) => {
        try {
          window.statsigClient && window.statsigClient.logEvent(name, value, metadata);
        } catch (err) {
          console.warn('Statsig logEvent failed', err);
        }
      };

      // --- UI Helpers -------------------------------------------------------------
      const currency = (n) => `$${n.toFixed(2)}`;

      // Reactive Statsig gate hook for the CDN build. Re-evaluates on every
      // `values_updated` event so HMR / SDK readiness flips the UI automatically.
      const useStatsigGate = (gateName, fallback = false) => {
        const read = () => {
          const c = window.statsigClient;
          if (!c || typeof c.checkGate !== 'function') return fallback;
          try { return c.checkGate(gateName); } catch { return fallback; }
        };
        const [value, setValue] = useState(read);
        useEffect(() => {
          let cancelled = false;
          (window.statsigReady || Promise.resolve()).then(() => {
            if (!cancelled) setValue(read());
          });
          const c = window.statsigClient;
          const handler = () => !cancelled && setValue(read());
          if (c && typeof c.on === 'function') c.on('values_updated', handler);
          return () => {
            cancelled = true;
            if (c && typeof c.off === 'function') c.off('values_updated', handler);
          };
        }, [gateName]);
        return value;
      };

      // Dynamic config fetcher for Statsig configs.
      // NOTE: `fallback` is intentionally NOT in the dep array — callers usually
      // pass an inline object literal which would be a new reference every
      // render and cause an infinite update loop.
      const useStatsigConfig = (configName, fallback = {}) => {
        const [config, setConfig] = useState(fallback);
        const [raw, setRaw] = useState(null);
        useEffect(() => {
          let cancelled = false;
          function updateConfig(reason) {
            const c = window.statsigClient;
            // Prefer v3's `getDynamicConfig`; fall back to legacy `getConfig` if present.
            const getter =
              c && typeof c.getDynamicConfig === "function"
                ? c.getDynamicConfig.bind(c)
                : c && typeof c.getConfig === "function"
                ? c.getConfig.bind(c)
                : null;
            if (!getter) {
              console.warn('[Statsig] no getDynamicConfig/getConfig method on client');
              return;
            }
            let next = null;
            let conf = null;
            try {
              conf = getter(configName);
              // Statsig v3 DynamicConfig exposes `.value`; older builds used `.getValue()`.
              if (conf && conf.value && typeof conf.value === "object") {
                next = conf.value;
              } else if (conf && typeof conf.getValue === "function") {
                next = conf.getValue();
              }
            } catch (err) {
              console.warn('[Statsig] getDynamicConfig threw', err);
              next = null;
            }
            console.log('[Statsig] dynamic config read', {
              configName,
              reason,
              raw: conf,
              value: conf && conf.value,
              ruleID: conf && conf.ruleID,
              details: conf && conf.details,
              resolvedValue: next,
            });
            if (!cancelled) setRaw({ conf, next, reason, at: Date.now() });
            if (next == null) return;
            setConfig((prev) => {
              if (prev === next) return prev;
              try {
                if (JSON.stringify(prev) === JSON.stringify(next)) return prev;
              } catch {}
              return next;
            });
          }
          (window.statsigReady || Promise.resolve()).then(() => {
            if (!cancelled) updateConfig('initial');
          });
          const c = window.statsigClient;
          const handler = () => { if (!cancelled) updateConfig('values_updated'); };
          if (c && typeof c.on === "function") c.on("values_updated", handler);
          return () => {
            cancelled = true;
            if (c && typeof c.off === "function") c.off("values_updated", handler);
          };
        }, [configName]);
        // Stash debug info on the window so the debug panel can render it without
        // needing every consumer to plumb it through props.
        useEffect(() => {
          if (!raw) return;
          window.__statsigDebug = window.__statsigDebug || {};
          window.__statsigDebug[configName] = raw;
          window.dispatchEvent(new CustomEvent('statsig-debug-update', { detail: { configName, raw } }));
        }, [raw, configName]);
        return config;
      };

      function Header({ onOpenSignup, onOpenCart }) {

              </div>
              <div className="flex gap-2">
                <button onClick={onOpenSignup} className="px-3 py-2 rounded-xl bg-neutral-900 text-white hover:opacity-90">Sign Up</button>

              </div>
            </div>
          </header>

      }

      // Stable fallback object so the inline default doesn't re-trigger the
      // `useStatsigConfig` effect on every Hero render.
      // Dashboard JSON shape: { "promoConfig": <number> }
      const PROMO_FALLBACK = { promoConfig: 5 };
      const PROMO_DEFAULT = 5;

      // Helper: pull a numeric discount out of the raw dynamic-config value,
      // tolerating a couple of legacy key names so older dashboards still work.
      const readPromoDiscount = (cfg) => {
        if (cfg && typeof cfg.promoConfig === "number") return cfg.promoConfig;
        if (cfg && typeof cfg.value === "number") return cfg.value;
        return PROMO_DEFAULT;
      };

      function Hero() {
        // Pull the sign-up promo from a Statsig dynamic config:
        //   const myStatsigClient = new StatsigClient(...)
        //   myStatsigClient.getDynamicConfig("sign_up_promo")
        // We expose the raw `.value` object via the useStatsigConfig hook below.
        const promoConfig = useStatsigConfig("sign_up_promo", PROMO_FALLBACK);
        const promoDiscount = readPromoDiscount(promoConfig);
        // Hide the promo bullet only if the dashboard explicitly turns it off
        // (set `promoConfig` to 0, or add `enabled: false` to the config).
        const showPromo =
          promoConfig.enabled === false ? false : promoDiscount > 0;

        return (
          <section className="bg-gradient-to-br from-orange-50 to-red-50 border-b">

                  <div className="text-center">
                    <div className="text-7xl">🍜</div>
                    <p className="mt-2 text-gray-700 font-medium">Add your favorites & check out below</p>

            <div className="flex items-start justify-between">

                <h3 className="font-semibold text-lg">{dish.name}</h3>
                <p className="text-sm text-gray-600">{dish.desc}</p>

      function CartDrawer({ open, onClose, items, updateQty, removeItem, onCheckout }) {
        const subtotal = items.reduce((s, it) => s + it.price * it.qty, 0);

        return (

            <div

            {/* Panel */}
            <aside className={`absolute right-0 top-0 h-full w-full sm:w-[420px] bg-white shadow-xl border-l p-4 transition-transform ${open ? "translate-x-0" : "translate-x-full"}`}>
              <div className="flex items-center justify-between">

                      <div className="mt-2 flex items-center gap-2">

                ))}
              </div>
              <div className="mt-4 border-t pt-4 space-y-1 text-sm">

              </form>
            </div>
          </div>
        );

      function SignupModal({ open, onClose, onSubmit, discountValue }) {
        const [form, setForm] = useState({ name: "", email: "", phone: "", birthday: "", marketing: true });
        const update = (k, v) => setForm((f) => ({ ...f, [k]: v }));
        useEffect(() => { if (!open) setForm({ name: "", email: "", phone: "", birthday: "", marketing: true }); }, [open]);

        return (
          <div className={`fixed inset-0 z-[60] ${open ? "" : "pointer-events-none"}`}>
            <div className={`absolute inset-0 bg-black/40 transition ${open ? "opacity-100" : "opacity-0"}`} onClick={onClose} />
            <div className={`absolute left-1/2 top-1/2 w-[95vw] max-w-lg -translate-x-1/2 -translate-y-1/2 rounded-2xl bg-white p-5 shadow-xl border transition ${open?"scale-100 opacity-100":"scale-95 opacity-0"}`}>
              <div className="flex items-center justify-between mb-2">
                <h3 className="text-lg font-semibold">Join Our Taste Buds Club</h3>
                <button onClick={onClose} className="rounded-lg border px-2 py-1">Close</button>
              </div>
              <div className="mb-3 rounded-xl border border-orange-200 bg-orange-50 px-4 py-3 flex items-center gap-3">
                <div className="text-2xl">🎉</div>
                <div className="text-sm text-orange-900">
                  <div className="font-semibold">
                    <span className="text-orange-700">{discountValue}% OFF</span> your first order
                  </div>
                  <div className="text-orange-800/80">Sign up today and we'll apply it automatically at checkout.</div>
                </div>
              </div>
              <form className="space-y-3" onSubmit={(e)=>{ e.preventDefault(); onSubmit(form); }}>
                <div className="grid sm:grid-cols-2 gap-3">
                  <div>
                    <label className="text-sm">Full Name</label>
                    <input required className="mt-1 w-full rounded-xl border px-3 py-2" value={form.name} onChange={(e)=>update("name", e.target.value)} />
                  </div>
                  <div>
                    <label className="text-sm">Email</label>
                    <input required type="email" className="mt-1 w-full rounded-xl border px-3 py-2" value={form.email} onChange={(e)=>update("email", e.target.value)} />
                  </div>
                </div>
                <div className="grid sm:grid-cols-2 gap-3">
                  <div>
                    <label className="text-sm">Phone</label>
                    <input className="mt-1 w-full rounded-xl border px-3 py-2" value={form.phone} onChange={(e)=>update("phone", e.target.value)} />
                  </div>
                  <div>
                    <label className="text-sm">Birthday</label>
                    <input type="date" className="mt-1 w-full rounded-xl border px-3 py-2" value={form.birthday} onChange={(e)=>update("birthday", e.target.value)} />
                  </div>
                </div>
                <label className="flex items-center gap-2 text-sm">
                  <input type="checkbox" checked={form.marketing} onChange={(e)=>update("marketing", e.target.checked)} />
                  I agree to receive tasty updates & promos
                </label>
                <button className="w-full rounded-xl bg-neutral-900 text-white px-4 py-3" type="submit">Sign Me Up</button>
              </form>
            </div>
          </div>
        );
      }

      function Footer() {
        return (
          <footer className="mt-16 border-t">
            <div className="mx-auto max-w-6xl px-4 py-8 text-sm text-gray-600 grid sm:grid-cols-3 gap-6">
              <div>
                <div className="font-semibold">Wok This Way</div>
                <div>123 Lantern Lane, Flavor Town</div>
                <div>Open daily 11:00–21:30</div>
              </div>
              <div>
                <div className="font-semibold">Contact</div>
                <div>📞 (555) 888‑1688</div>
                <div>✉️ hello@wokthisway.test</div>
              </div>
              <div>
                <div className="font-semibold">All data is local</div>
                <div>Sign‑ups & orders are saved to your browser only (localStorage).</div>
              </div>
            </div>
          </footer>
        );
      }

      function SignupList() {
        const [list, setList] = useState(() => readLS(LS_KEYS.SIGNUPS, []));
        useEffect(()=>{
          const id = setInterval(()=>setList(readLS(LS_KEYS.SIGNUPS, [])), 1000);
          return ()=>clearInterval(id);
        },[]);
        if (list.length === 0) return <div className="text-sm text-gray-500">No sign‑ups yet.</div>;
        return (
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="text-left text-gray-500">
                <tr>
                  <th className="py-1 pr-2">Name</th>
                  <th className="py-1 pr-2">Email</th>
                  <th className="py-1 pr-2">Phone</th>
                  <th className="py-1 pr-2">Birthday</th>
                  <th className="py-1 pr-2">Opt‑in</th>
                </tr>
              </thead>
              <tbody>
                {list.map((s) => (
                  <tr key={s.id} className="border-t">
                    <td className="py-1 pr-2">{s.name}</td>
                    <td className="py-1 pr-2">{s.email}</td>
                    <td className="py-1 pr-2">{s.phone || "—"}</td>
                    <td className="py-1 pr-2">{s.birthday || "—"}</td>
                    <td className="py-1 pr-2">{s.marketing ? "Yes" : "No"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        );
      }

      function StatsigDebug({ configName }) {
        const [tick, setTick] = useState(0);
        useEffect(() => {
          const onUpdate = (e) => {
            if (!e.detail || e.detail.configName === configName) setTick((t) => t + 1);
          };
          window.addEventListener('statsig-debug-update', onUpdate);
          return () => window.removeEventListener('statsig-debug-update', onUpdate);
        }, [configName]);

        const c = window.statsigClient;
        const dbg = (window.__statsigDebug && window.__statsigDebug[configName]) || null;
        const sdkStatus = document.documentElement.getAttribute('data-statsig') || 'unknown';
        const methods = c
          ? ['getDynamicConfig', 'getConfig', 'getExperiment', 'getFeatureGate', 'checkGate', 'updateUserAsync', 'on', 'off']
              .filter((m) => typeof c[m] === 'function')
          : [];

        const refresh = async () => {
          const client = window.statsigClient;
          if (!client) return;
          try {
            if (typeof client.updateUserAsync === 'function') {
              // Re-fetch latest values from Statsig for the same user.
              const userID = localStorage.getItem('wok_statsig_user_id');
              await client.updateUserAsync({
                userID,
                userAgent: navigator.userAgent,
                locale: navigator.language,
                custom: { app: 'wok-this-way' },
              });
            } else if (typeof client.refreshAsync === 'function') {
              await client.refreshAsync();
            }
            window.dispatchEvent(new CustomEvent('statsig-debug-update', { detail: { configName } }));
            setTick((t) => t + 1);
          } catch (err) {
            console.warn('[Statsig] refresh failed', err);
          }
        };

        return (
          <div className="text-xs space-y-2">
            <div>
              <span className="text-gray-500">SDK status:</span>{' '}
              <span className="font-mono">{sdkStatus}</span>
              {' · '}
              <span className="text-gray-500">client methods:</span>{' '}
              <span className="font-mono">{methods.length ? methods.join(', ') : '(none)'}</span>
            </div>
            <div>
              <span className="text-gray-500">Config name:</span>{' '}
              <span className="font-mono">{configName}</span>
              {dbg && dbg.conf && (
                <>
                  {' · '}
                  <span className="text-gray-500">ruleID:</span>{' '}
                  <span className="font-mono">{String(dbg.conf.ruleID || '—')}</span>
                </>
              )}
            </div>
            <div>
              <span className="text-gray-500">Raw value (`.value`):</span>
              <pre className="mt-1 rounded-lg bg-neutral-900 text-neutral-100 p-2 overflow-x-auto">
{JSON.stringify(dbg && dbg.conf ? dbg.conf.value : null, null, 2)}
              </pre>
            </div>
            {dbg && dbg.conf && dbg.conf.details && (
              <div>
                <span className="text-gray-500">Eval details:</span>
                <pre className="mt-1 rounded-lg bg-neutral-50 border p-2 overflow-x-auto">
{JSON.stringify(dbg.conf.details, null, 2)}
                </pre>
              </div>
            )}
            <button
              onClick={refresh}
              className="px-3 py-1.5 rounded-lg border bg-white hover:bg-gray-50"
            >
              Re-fetch from Statsig
            </button>
            <div className="text-[11px] text-gray-500">
              Last update: {dbg ? new Date(dbg.at).toLocaleTimeString() + ' (' + dbg.reason + ')' : '—'}
            </div>
          </div>
        );
      }

      function OrdersList() {
        const [orders, setOrders] = useState(() => readLS(LS_KEYS.ORDERS, []));
        useEffect(()=>{
          const id = setInterval(()=>setOrders(readLS(LS_KEYS.ORDERS, [])), 1000);
          return ()=>clearInterval(id);
        },[]);
        if (orders.length === 0) return <div className="text-sm text-gray-500">No orders placed yet.</div>;
        return (
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead className="text-left text-gray-500">
                <tr>
                  <th className="py-1 pr-2">Order #</th>
                  <th className="py-1 pr-2">Items</th>
                  <th className="py-1 pr-2">Total</th>
                  <th className="py-1 pr-2">Customer</th>
                  <th className="py-1 pr-2">Created</th>
                </tr>
              </thead>
              <tbody>
                {orders.map((o) => (
                  <tr key={o.id} className="border-t align-top">
                    <td className="py-1 pr-2 whitespace-nowrap">{o.id}</td>
                    <td className="py-1 pr-2">
                      <ul className="list-disc list-inside">
                        {o.items.map((it)=> (
                          <li key={it.id}>{it.qty}× {it.name} — {currency(it.price * it.qty)}</li>
                        ))}
                      </ul>
                    </td>
                    <td className="py-1 pr-2">{currency(o.total)}</td>
                    <td className="py-1 pr-2">
                      <div className="font-medium">{o.customer.name}</div>
                      <div className="text-gray-500">{o.customer.phone}</div>
                      <div className="text-gray-500">{o.customer.method === "delivery" ? o.customer.address : "Pickup"}</div>
                    </td>
                    <td className="py-1 pr-2 whitespace-nowrap">{new Date(o.createdAt).toLocaleString()}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        );
      }

      function App() {
        // Cart state
        const [cart, setCart] = useState(() => readLS(LS_KEYS.CART, []));
        const [category, setCategory] = useState("All");
        const [query, setQuery] = useState("");
        const [cartOpen, setCartOpen] = useState(false);
        const [checkoutOpen, setCheckoutOpen] = useState(false);
        const [signupOpen, setSignupOpen] = useState(false);
        const [toast, setToast] = useState(null);

        // Fetch promo discount config from Statsig dynamic config (default to 5).
        // The config name is "sign_up_promo", expecting `{ "promoConfig": <number> }`.
        // Use the same shared fallback ref as Hero so we don't re-fire the effect.
        const promoConfig = useStatsigConfig("sign_up_promo", PROMO_FALLBACK);
        const promoDiscount = readPromoDiscount(promoConfig);

        useEffect(()=>{ writeLS(LS_KEYS.CART, cart); }, [cart]);

        const addToCart = (dish, qty) => {
          setCart((prev) => {
            const found = prev.find((p) => p.id === dish.id);
            if (found) return prev.map((p) => p.id === dish.id ? { ...p, qty: p.qty + qty } : p);
            return [...prev, { id: dish.id, name: dish.name, price: dish.price, qty }];
          });
          setCartOpen(true);
          flashToast(`${qty}× ${dish.name} added to cart`);
          logStatsigEvent('add_to_cart', dish.price * qty, {
            dish_id: dish.id,
            dish_name: dish.name,
            category: dish.category,
            qty: String(qty),
          });
        };

        const updateQty = (id, qty) => setCart((prev) => prev.map((p) => p.id===id?{...p, qty}:p));
        const removeItem = (id) => setCart((prev) => prev.filter((p)=>p.id!==id));

        const filtered = useMemo(() => {
          let list = DISHES;
          if (category !== "All") list = list.filter((d) => d.category === category);
          if (query.trim()) list = list.filter((d) => d.name.toLowerCase().includes(query.toLowerCase()));
          return list;
        }, [category, query]);

        const subtotal = cart.reduce((s, it) => s + it.price * it.qty, 0);
        const tax = subtotal * 0.08;
        const total = subtotal + tax;

        const placeOrder = (customer) => {
          const order = { id: `ORD-${Date.now()}`, items: cart, total, customer, createdAt: new Date().toISOString() };
          const orders = readLS(LS_KEYS.ORDERS, []);
          writeLS(LS_KEYS.ORDERS, [order, ...orders]);
          logStatsigEvent('order_placed', total, {
            order_id: order.id,
            item_count: String(cart.reduce((n, it) => n + it.qty, 0)),
            method: customer.method,
          });
          setCart([]);
          setCheckoutOpen(false);
          flashToast(`Order placed! #${order.id}`);
        };

        const handleSignup = (data) => {
          const signups = readLS(LS_KEYS.SIGNUPS, []);
          writeLS(LS_KEYS.SIGNUPS, [{ id: `CUST-${Date.now()}`, ...data, createdAt: new Date().toISOString() }, ...signups]);
          logStatsigEvent('signup', null, {
            email: data.email,
            marketing_opt_in: String(!!data.marketing),
          });
          setSignupOpen(false);
          flashToast(`Thanks for signing up! ${promoDiscount}% off your first order.`);
        };

        const flashToast = (text) => {
          setToast(text);
          setTimeout(()=>setToast(null), 2600);
        };

        return (
          <div className="min-h-screen">
            <Header onOpenSignup={()=>setSignupOpen(true)} onOpenCart={()=>setCartOpen(true)} />
            <Hero />

            <main className="mx-auto max-w-6xl px-4 py-10">
              {/* Filters */}
              <div className="flex flex-wrap items-center gap-3">
                <div className="flex gap-2 overflow-x-auto">
                  {CATEGORIES.map((c) => (
                    <button
                      key={c}
                      onClick={()=>setCategory(c)}
                      className={`px-3 py-2 rounded-xl border ${category===c?"bg-neutral-900 text-white":"bg-white hover:bg-gray-50"}`}
                    >{c}</button>
                  ))}
                </div>
                <div className="ml-auto flex items-center gap-2">
                  <input
                    placeholder="Search dishes…"
                    className="w-64 max-w-[60vw] rounded-xl border px-3 py-2"
                    value={query}
                    onChange={(e)=>setQuery(e.target.value)}
                  />
                  <button onClick={()=>{ setQuery(""); setCategory("All"); }} className="px-3 py-2 rounded-xl border">Clear</button>
                </div>
              </div>

              {/* Menu grid */}
              <div className="mt-6 grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
                {filtered.map((dish) => (
                  <DishCard key={dish.id} dish={dish} onAdd={addToCart} />
                ))}
              </div>

              {/* Cart summary bar */}
              <div className="mt-8 rounded-2xl border bg-white p-4 flex items-center gap-3 shadow-sm">
                <div className="text-sm text-gray-600">{cart.length} items in cart</div>
                <div className="ml-auto font-semibold">{currency(total)}</div>
                <button onClick={()=>setCartOpen(true)} className="px-3 py-2 rounded-xl border">View Cart</button>
                <button onClick={()=>setCheckoutOpen(true)} disabled={cart.length===0} className="px-3 py-2 rounded-xl bg-orange-600 text-white disabled:opacity-40">Checkout</button>
              </div>

              {/* Admin-ish viewer for demo */}
              <section className="mt-12">
                <h4 className="text-lg font-semibold mb-2">Demo Data Viewer</h4>
                <div className="grid md:grid-cols-2 gap-4">
                  <div className="rounded-2xl border bg-white p-4">
                    <div className="font-medium mb-2">Saved Sign‑ups</div>
                    <SignupList />
                  </div>
                  <div className="rounded-2xl border bg-white p-4">
                    <div className="font-medium mb-2">Saved Orders</div>
                    <OrdersList />
                  </div>
                </div>
                <div className="mt-4 rounded-2xl border bg-white p-4">
                  <div className="font-medium mb-2">Statsig Dynamic Config debug — <span className="font-mono text-xs">sign_up_promo</span></div>
                  <StatsigDebug configName="sign_up_promo" />
                  <div className="mt-3 text-xs text-gray-500">
                    Resolved discount used by UI:{' '}
                    <span className="font-mono">{promoDiscount}%</span>
                  </div>
                </div>
              </section>
            </main>

            <Footer />

            <CartDrawer
              open={cartOpen}
              onClose={()=>setCartOpen(false)}
              items={cart}
              updateQty={(id, qty)=>setCart((prev)=>prev.map((p)=>p.id===id?{...p, qty}:p))}
              removeItem={(id)=>setCart((prev)=>prev.filter((p)=>p.id!==id))}
              onCheckout={()=>{ setCartOpen(false); setCheckoutOpen(true); }}
            />

            <CheckoutModal open={checkoutOpen} onClose={()=>setCheckoutOpen(false)} onPlaceOrder={placeOrder} total={total} />
            <SignupModal open={signupOpen} onClose={()=>setSignupOpen(false)} onSubmit={handleSignup} discountValue={promoDiscount} />

            {/* Toast */}
            <div className={`fixed left-1/2 bottom-6 -translate-x-1/2 rounded-xl bg-black text-white px-4 py-2 shadow-lg transition ${toast?"opacity-100 translate-y-0":"opacity-0 translate-y-3"}`}>
              {toast}
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
